version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: visionvault_redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: visionvault_api
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]
    restart: always

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: visionvault_worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    command: ["celery", "-A", "worker.tasks", "worker", "--loglevel=info", "--pool=solo"]
    restart: always
